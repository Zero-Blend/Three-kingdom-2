<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>真三國大戰2｜武將圖鑒</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ===== TOKENS ===== */
:root {
  --font-display: 'Noto Serif TC', serif;
  --font-body: 'Satoshi', sans-serif;
  --text-xs:   clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
  --text-sm:   clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
  --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
  --text-lg:   clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
  --text-xl:   clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
  --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem;
  --space-4: 1rem;    --space-6: 1.5rem; --space-8: 2rem;
  --space-10: 2.5rem; --space-12: 3rem;
  --radius-sm: 0.375rem; --radius-md: 0.5rem; --radius-lg: 0.75rem;
  --radius-xl: 1rem; --radius-full: 9999px;
  --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
}

/* ===== DARK THEME (default — game feel) ===== */
[data-theme="dark"] {
  --bg:         #0d0c0a;
  --surface:    #161410;
  --surface-2:  #1e1b16;
  --surface-3:  #28241c;
  --border:     rgba(255,220,120,0.12);
  --divider:    rgba(255,220,120,0.08);
  --text:       #e8dfc8;
  --text-muted: #9c9080;
  --text-faint: #5a5448;
  --gold:       #d4a843;
  --gold-glow:  rgba(212,168,67,0.25);
  --red:        #c0392b;
  --blue-faction: #2471a3;
  --green-faction:#1e8449;
  --shadow-card: 0 4px 24px rgba(0,0,0,0.5);
  --shadow-glow: 0 0 20px rgba(212,168,67,0.2);
}
[data-theme="light"] {
  --bg:         #f5f0e8;
  --surface:    #faf6ee;
  --surface-2:  #ffffff;
  --surface-3:  #ede8dc;
  --border:     rgba(120,80,0,0.15);
  --divider:    rgba(120,80,0,0.1);
  --text:       #2c1f0a;
  --text-muted: #7a6040;
  --text-faint: #b8a080;
  --gold:       #a0720a;
  --gold-glow:  rgba(160,114,10,0.15);
  --red:        #922b21;
  --blue-faction:#1a5276;
  --green-faction:#1a5e36;
  --shadow-card: 0 4px 20px rgba(80,40,0,0.15);
  --shadow-glow: 0 0 16px rgba(160,114,10,0.12);
}

/* ===== BASE ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;}
body{
  font-family:var(--font-body);
  font-size:var(--text-base);
  color:var(--text);
  background:var(--bg);
  min-height:100dvh;
  line-height:1.6;
}
img{display:block;max-width:100%;height:auto;}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;}
:focus-visible{outline:2px solid var(--gold);outline-offset:3px;border-radius:var(--radius-sm);}

/* ===== HEADER ===== */
header {
  position:sticky; top:0; z-index:100;
  background:var(--surface);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: var(--space-3) var(--space-4);
  display: flex; align-items: center; gap: var(--space-3);
}
.logo {
  display:flex; align-items:center; gap:var(--space-2);
  text-decoration:none; color:var(--gold);
  font-family:var(--font-display); font-size:var(--text-lg); font-weight:700;
  letter-spacing:0.05em; text-shadow:0 0 12px var(--gold-glow);
  flex-shrink:0;
}
.logo svg { width:28px; height:28px; flex-shrink:0; }

/* SEARCH */
.search-wrap {
  flex:1; position:relative; min-width:0;
}
.search-wrap input {
  width:100%; padding: var(--space-2) var(--space-3) var(--space-2) 2.4rem;
  background:var(--surface-3); border:1px solid var(--border);
  border-radius:var(--radius-full); color:var(--text);
  font-size:var(--text-sm); outline:none;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.search-wrap input:focus {
  border-color:var(--gold); box-shadow:0 0 0 3px var(--gold-glow);
}
.search-wrap .search-icon {
  position:absolute; left:0.75rem; top:50%; transform:translateY(-50%);
  color:var(--text-muted); pointer-events:none;
}
.search-wrap input::placeholder { color:var(--text-faint); }

/* THEME TOGGLE */
.theme-toggle {
  width:40px; height:40px; border-radius:var(--radius-full);
  display:flex; align-items:center; justify-content:center;
  color:var(--text-muted); transition:color var(--transition), background var(--transition);
  flex-shrink:0;
}
.theme-toggle:hover { color:var(--gold); background:var(--surface-3); }

/* ===== FILTERS ===== */
.filter-bar {
  padding: var(--space-3) var(--space-4);
  display:flex; gap:var(--space-2); overflow-x:auto;
  scrollbar-width:none; border-bottom:1px solid var(--divider);
  background:var(--surface);
}
.filter-bar::-webkit-scrollbar { display:none; }
.filter-pill {
  padding: var(--space-1) var(--space-3);
  border-radius:var(--radius-full); font-size:var(--text-xs);
  border: 1px solid var(--border); white-space:nowrap;
  color:var(--text-muted); background:transparent;
  transition: all var(--transition);
  font-weight:500; letter-spacing:0.03em;
}
.filter-pill:hover { color:var(--gold); border-color:var(--gold); }
.filter-pill.active {
  background:var(--gold); color:#0d0c0a; border-color:var(--gold);
  box-shadow: 0 2px 8px var(--gold-glow);
}

/* ===== GRID ===== */
.grid-container {
  padding: var(--space-4);
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(min(160px,100%), 1fr));
  gap: var(--space-4);
}
@media(min-width:600px){
  .grid-container { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
}
@media(min-width:900px){
  .grid-container { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
}

/* ===== CARD ===== */
.general-card {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-xl);
  overflow:hidden;
  box-shadow:var(--shadow-card);
  cursor:pointer;
  transition: transform var(--transition), box-shadow var(--transition);
  position:relative;
}
.general-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-card), var(--shadow-glow);
}
.general-card:active { transform: translateY(-1px); }

/* RARITY TOP BAR */
.rarity-bar {
  height:3px; width:100%;
}
.rarity-S  { background: linear-gradient(90deg,#d4a843,#ff6b35); }
.rarity-A  { background: linear-gradient(90deg,#9b59b6,#6c3483); }
.rarity-B  { background: linear-gradient(90deg,#2980b9,#1a5276); }
.rarity-C  { background: linear-gradient(90deg,#27ae60,#1e8449); }

.card-art {
  width:100%; aspect-ratio:3/4; object-fit:cover; display:block;
  background:var(--surface-3);
}
.card-art-placeholder {
  width:100%; aspect-ratio:3/4;
  display:flex; align-items:center; justify-content:center;
  font-size:3rem; background:var(--surface-3); color:var(--text-faint);
}

.card-body { padding: var(--space-3); }
.card-name {
  font-family:var(--font-display); font-size:var(--text-base);
  font-weight:700; color:var(--gold); letter-spacing:0.03em;
  margin-bottom:var(--space-1);
}
.card-tags {
  display:flex; flex-wrap:wrap; gap:var(--space-1); margin-bottom:var(--space-2);
}
.tag {
  font-size:var(--text-xs); padding:1px 6px;
  border-radius:var(--radius-sm); font-weight:500;
}
.tag-wei  { background:rgba(36,113,163,0.25); color:#5dade2; border:1px solid rgba(36,113,163,0.4); }
.tag-shu  { background:rgba(30,132,73,0.25); color:#52be80; border:1px solid rgba(30,132,73,0.4); }
.tag-wu   { background:rgba(192,57,43,0.25); color:#ec7063; border:1px solid rgba(192,57,43,0.4); }
.tag-qun  { background:rgba(130,90,20,0.25); color:#f0b429; border:1px solid rgba(130,90,20,0.4); }
.tag-type { background:var(--surface-3); color:var(--text-muted); border:1px solid var(--border); }

.card-stats {
  display:grid; grid-template-columns:1fr 1fr; gap:2px;
}
.stat {
  font-size:var(--text-xs); color:var(--text-muted);
}
.stat span { color:var(--text); font-weight:600; }

/* RARITY BADGE */
.rarity-badge {
  position:absolute; top:var(--space-2); right:var(--space-2);
  background:rgba(0,0,0,0.6); border-radius:var(--radius-sm);
  padding:1px 5px; font-size:0.6rem; font-weight:700; letter-spacing:0.08em;
}
.rarity-badge.S { color:#ffd700; text-shadow:0 0 6px gold; }
.rarity-badge.A { color:#bf80ff; }
.rarity-badge.B { color:#5dade2; }
.rarity-badge.C { color:#52be80; }

/* ===== MODAL ===== */
.modal-overlay {
  position:fixed; inset:0; z-index:200;
  background:rgba(0,0,0,0.75); backdrop-filter:blur(4px);
  display:flex; align-items:flex-end;
  opacity:0; pointer-events:none; transition:opacity 0.25s;
}
@media(min-width:600px){
  .modal-overlay { align-items:center; justify-content:center; }
}
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-xl) var(--radius-xl) 0 0;
  width:100%; max-height:92dvh; overflow-y:auto;
  transform:translateY(60px); transition:transform 0.3s cubic-bezier(0.16,1,0.3,1);
  padding-bottom:env(safe-area-inset-bottom);
}
@media(min-width:600px){
  .modal {
    border-radius:var(--radius-xl);
    max-width:520px; max-height:85dvh;
    transform:scale(0.95);
  }
}
.modal-overlay.open .modal { transform:translateY(0) scale(1); }

.modal-handle {
  width:40px; height:4px; border-radius:var(--radius-full);
  background:var(--border); margin:var(--space-3) auto var(--space-2);
}
@media(min-width:600px){ .modal-handle{display:none;} }

.modal-art {
  width:100%; max-height:260px; object-fit:cover; object-position:top;
}
.modal-art-placeholder {
  width:100%; height:200px;
  display:flex; align-items:center; justify-content:center;
  font-size:5rem; background:var(--surface-3); color:var(--text-faint);
}
.modal-content { padding: var(--space-4) var(--space-4) var(--space-8); }

.modal-header {
  display:flex; justify-content:space-between; align-items:flex-start;
  margin-bottom:var(--space-3);
}
.modal-name {
  font-family:var(--font-display); font-size:var(--text-xl);
  color:var(--gold); font-weight:700;
  text-shadow:0 0 12px var(--gold-glow);
}
.modal-close {
  width:36px; height:36px; border-radius:var(--radius-full);
  display:flex; align-items:center; justify-content:center;
  color:var(--text-muted); background:var(--surface-3);
  transition:color var(--transition);
}
.modal-close:hover { color:var(--gold); }

.stat-grid {
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:var(--space-2); margin:var(--space-4) 0;
}
.stat-block {
  background:var(--surface-3); border-radius:var(--radius-md);
  padding:var(--space-2) var(--space-3); text-align:center;
  border:1px solid var(--border);
}
.stat-label { font-size:var(--text-xs); color:var(--text-muted); margin-bottom:2px; }
.stat-value { font-size:var(--text-lg); font-weight:700; color:var(--gold); }

.skill-list { display:flex; flex-direction:column; gap:var(--space-3); }
.skill-item {
  background:var(--surface-2);
  border:1px solid var(--border);
  border-radius:var(--radius-md);
  padding: var(--space-3);
}
.skill-name {
  font-weight:700; color:var(--text); font-size:var(--text-sm);
  margin-bottom:var(--space-1); display:flex; align-items:center; gap:var(--space-2);
}
.skill-badge {
  font-size:0.6rem; padding:1px 5px;
  border-radius:var(--radius-sm); background:var(--gold);
  color:#0d0c0a; font-weight:700; letter-spacing:0.05em;
}
.skill-desc { font-size:var(--text-sm); color:var(--text-muted); line-height:1.55; }

.section-title {
  font-size:var(--text-xs); font-weight:700; letter-spacing:0.12em;
  color:var(--text-faint); text-transform:uppercase; margin-bottom:var(--space-3);
}

.faction-banner {
  padding:var(--space-2) var(--space-3);
  border-radius:var(--radius-md);
  font-weight:700; font-size:var(--text-sm);
  display:inline-flex; align-items:center; gap:var(--space-2);
  margin-bottom:var(--space-4);
}
.faction-wei { background:rgba(36,113,163,0.2); color:#5dade2; border:1px solid rgba(36,113,163,0.4); }
.faction-shu { background:rgba(30,132,73,0.2); color:#52be80; border:1px solid rgba(30,132,73,0.4); }
.faction-wu  { background:rgba(192,57,43,0.2); color:#ec7063; border:1px solid rgba(192,57,43,0.4); }
.faction-qun { background:rgba(130,90,20,0.2); color:#f0b429; border:1px solid rgba(130,90,20,0.4); }

.no-results {
  text-align:center; padding:var(--space-12) var(--space-4);
  color:var(--text-faint); font-size:var(--text-base);
}
.no-results .icon { font-size:2.5rem; margin-bottom:var(--space-3); }

/* BAR CHART */
.stat-bar-row {
  display:flex; align-items:center; gap:var(--space-3);
  margin-bottom:var(--space-2);
}
.bar-label { font-size:var(--text-xs); color:var(--text-muted); width:2.5rem; flex-shrink:0; text-align:right; }
.bar-track { flex:1; height:6px; background:var(--surface-3); border-radius:var(--radius-full); overflow:hidden; }
.bar-fill {
  height:100%; border-radius:var(--radius-full);
  background:linear-gradient(90deg, var(--gold), #ff9f43);
  transition: width 0.6s cubic-bezier(0.16,1,0.3,1);
}
.bar-val { font-size:var(--text-xs); color:var(--text); font-weight:600; width:2rem; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <a class="logo" href="#">
    <svg viewBox="0 0 28 28" fill="none" aria-label="真三國大戰2">
      <polygon points="14,2 26,8 26,20 14,26 2,20 2,8" stroke="currentColor" stroke-width="1.5" fill="none"/>
      <polygon points="14,6 22,10 22,18 14,22 6,18 6,10" stroke="currentColor" stroke-width="0.8" fill="none" opacity="0.5"/>
      <text x="14" y="18.5" text-anchor="middle" font-size="10" fill="currentColor" font-weight="bold" font-family="serif">将</text>
    </svg>
    真三國大戰2
  </a>

  <div class="search-wrap">
    <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="search" id="searchInput" placeholder="搜索武將…" autocomplete="off">
  </div>

  <button class="theme-toggle" data-theme-toggle aria-label="切換主題">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>
</header>

<!-- FILTER BAR -->
<div class="filter-bar" role="group" aria-label="篩選">
  <button class="filter-pill active" data-filter="all">全部</button>
  <button class="filter-pill" data-filter="wei">魏</button>
  <button class="filter-pill" data-filter="shu">蜀</button>
  <button class="filter-pill" data-filter="wu">吳</button>
  <button class="filter-pill" data-filter="qun">群</button>
</div>

<!-- GRID -->
<main class="grid-container" id="generalGrid" role="list"></main>
<div class="no-results" id="noResults" style="display:none">
  <div class="icon">🔍</div>
  <p>找不到符合條件的武將</p>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal" id="modalPanel">
    <div class="modal-handle"></div>
    <div id="modalArtContainer"></div>
    <div class="modal-content">
      <div class="modal-header">
        <div>
          <div id="modalFaction"></div>
          <div class="modal-name" id="modalTitle"></div>
        </div>
        <button class="modal-close" id="modalClose" aria-label="關閉">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M18 6 6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <p class="section-title">基礎屬性</p>
      <div class="stat-grid" id="modalStats"></div>

      <p class="section-title" style="margin-top:var(--space-4)">屬性雷達</p>
      <div id="modalBars" style="margin-bottom:var(--space-4)"></div>

      <p class="section-title">技能</p>
      <div class="skill-list" id="modalSkills"></div>
    </div>
  </div>
</div>

<script>
// ===== DATA =====
const generals = [
  {
    id:1,
    name:"曹操",
    faction:"wei",
    rarity:"S",
    type:"cavalry",
    emoji:"👑",
    bio:"《真三國大戰2》魏國核心君主型武將，官方定位為前排回血型肉盾，也是魏國體系的重要核心。",
    stats:{武力:86, 智力:82, 統率:98, 速度:72},
    skills:[
      {name:"天·霸者求心",type:"主動",desc:"己方全體魏國部隊物攻提高40%+149點，每8秒強化曹操9%物防，持續25秒。"},
      {name:"奸雄",type:"被動",desc:"專屬被動技能，讓曹操整體更耐打，進一步強化其前排承傷與持久作戰能力。"},
      {name:"武將定位",type:"攻略",desc:"適合作為魏國隊核心前排，能提供團隊物攻增益，同時兼顧坦度與續戰力，適合走魏國主體系。"}
    ]
  }
]

const factionMap = {
  wei:{label:"魏",class:"faction-wei"},
  shu:{label:"蜀",class:"faction-shu"},
  wu:{label:"吳",class:"faction-wu"},
  qun:{label:"群",class:"faction-qun"},
};
const typeMap = {cavalry:"騎兵",archer:"弓兵",infantry:"步兵"};

let activeFilter = "all";
let searchQuery = "";

// ===== RENDER =====
function renderCards(list) {
  const grid = document.getElementById("generalGrid");
  const noRes = document.getElementById("noResults");
  if (!list.length) { grid.innerHTML=""; noRes.style.display=""; return; }
  noRes.style.display="none";
  grid.innerHTML = list.map(g => `
    <article class="general-card" data-id="${g.id}" role="listitem" tabindex="0">
      <div class="rarity-bar rarity-${g.rarity}"></div>
      <div class="card-art-placeholder">${g.emoji}</div>
      <div class="rarity-badge ${g.rarity}">${g.rarity}</div>
      <div class="card-body">
        <div class="card-name">${g.name}</div>
        <div class="card-tags">
          <span class="tag tag-${g.faction}">${factionMap[g.faction].label}</span>
          <span class="tag tag-type">${typeMap[g.type]}</span>
        </div>
        <div class="card-stats">
          <div class="stat">武力 <span>${g.stats["武力"]}</span></div>
          <div class="stat">智力 <span>${g.stats["智力"]}</span></div>
          <div class="stat">統率 <span>${g.stats["統率"]}</span></div>
          <div class="stat">速度 <span>${g.stats["速度"]}</span></div>
        </div>
      </div>
    </article>
  `).join("");

  grid.querySelectorAll(".general-card").forEach(card => {
    card.addEventListener("click", () => openModal(+card.dataset.id));
    card.addEventListener("keydown", e => { if(e.key==="Enter"||e.key===" ") openModal(+card.dataset.id); });
  });
}

function filterAndRender() {
  let list = generals;
  if(activeFilter !== "all") {
    list = list.filter(g =>
      g.faction === activeFilter ||
      g.rarity  === activeFilter ||
      g.type    === activeFilter
    );
  }
  if(searchQuery) {
    list = list.filter(g => g.name.includes(searchQuery) || g.bio.includes(searchQuery));
  }
  renderCards(list);
}

// ===== FILTERS =====
document.querySelectorAll(".filter-pill").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelector(".filter-pill.active")?.classList.remove("active");
    btn.classList.add("active");
    activeFilter = btn.dataset.filter;
    filterAndRender();
  });
});
document.getElementById("searchInput").addEventListener("input", e => {
  searchQuery = e.target.value.trim();
  filterAndRender();
});

// ===== MODAL =====
function openModal(id) {
  const g = generals.find(x=>x.id===id);
  if(!g) return;

  document.getElementById("modalArtContainer").innerHTML =
    `<div class="modal-art-placeholder">${g.emoji}</div>`;
  document.getElementById("modalTitle").textContent = g.name;
  document.getElementById("modalFaction").innerHTML =
    `<span class="faction-banner ${factionMap[g.faction].class}">${factionMap[g.faction].label} · ${typeMap[g.type]}</span>`;

  // Stats grid
  const statEntries = Object.entries(g.stats);
  document.getElementById("modalStats").innerHTML = statEntries.map(([k,v])=>`
    <div class="stat-block">
      <div class="stat-label">${k}</div>
      <div class="stat-value">${v}</div>
    </div>
  `).join("");

  // Bar chart
  document.getElementById("modalBars").innerHTML = statEntries.map(([k,v])=>`
    <div class="stat-bar-row">
      <div class="bar-label">${k}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${v}%"></div></div>
      <div class="bar-val">${v}</div>
    </div>
  `).join("");

  // Skills
  document.getElementById("modalSkills").innerHTML = g.skills.map(s=>`
    <div class="skill-item">
      <div class="skill-name">
        ${s.name}
        <span class="skill-badge">${s.type}</span>
      </div>
      <div class="skill-desc">${s.desc}</div>
    </div>
  `).join("");

  document.getElementById("modalOverlay").classList.add("open");
  document.body.style.overflow="hidden";
}
function closeModal() {
  document.getElementById("modalOverlay").classList.remove("open");
  document.body.style.overflow="";
}
document.getElementById("modalClose").addEventListener("click", closeModal);
document.getElementById("modalOverlay").addEventListener("click", e => {
  if(e.target===document.getElementById("modalOverlay")) closeModal();
});
document.addEventListener("keydown", e => { if(e.key==="Escape") closeModal(); });

// ===== THEME TOGGLE =====
(function(){
  const btn = document.querySelector("[data-theme-toggle]");
  const root = document.documentElement;
  let theme = "dark";
  root.setAttribute("data-theme", theme);
  btn.addEventListener("click", () => {
    theme = theme === "dark" ? "light" : "dark";
    root.setAttribute("data-theme", theme);
    btn.innerHTML = theme === "dark"
      ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`
      : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`;
  });
})();
