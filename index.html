<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>真三國大戰2｜武將圖鑒</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
  --font-display:'Noto Serif TC',serif;
  --font-body:'Satoshi',sans-serif;
  --text-xs:clamp(0.75rem,0.7rem + 0.25vw,0.875rem);
  --text-sm:clamp(0.875rem,0.8rem + 0.35vw,1rem);
  --text-base:clamp(1rem,0.95rem + 0.25vw,1.125rem);
  --text-lg:clamp(1.125rem,1rem + 0.75vw,1.5rem);
  --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
  --radius-full:9999px;
  --transition:180ms cubic-bezier(0.16,1,0.3,1);
}
[data-theme="dark"]{
  --bg:#0a0906;
  --surface:#12100c;
  --surface-2:#1a170f;
  --surface-3:#242015;
  --border:rgba(232,192,112,0.18);
  --text:#f0e6d2;
  --text-muted:#a38b6b;
  --gold:#e8c070;
  --gold-glow:rgba(232,192,112,0.4);
  --shadow-card:0 8px 32px rgba(0,0,0,0.75);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--text);
  min-height:100dvh;
  line-height:1.6;
}
header{
  position:sticky;top:0;z-index:100;
  background:rgba(10,9,6,0.95);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:12px 16px;
  display:flex;align-items:center;gap:12px;
}
.logo{
  display:flex;align-items:center;gap:8px;
  text-decoration:none;
  color:var(--gold);
  font-family:var(--font-display);
  font-size:1.35rem;
  font-weight:700;
  letter-spacing:0.05em;
  text-shadow:0 0 15px var(--gold-glow);
}
.logo svg{width:32px;height:32px;flex-shrink:0;}
.search-wrap{flex:1;position:relative;}
.search-wrap input{
  width:100%;
  background:#1f1b14;
  border:1px solid var(--border);
  border-radius:9999px;
  padding:12px 16px 12px 48px;
  font-size:1rem;
  color:var(--text);
}
.search-icon{
  position:absolute;left:18px;top:50%;transform:translateY(-50%);
  font-size:1.25rem;
  opacity:0.7;
}
.theme-toggle{
  width:42px;height:42px;
  background:#1f1b14;
  border:1px solid var(--border);
  border-radius:50%;
  font-size:1.3rem;
}

main{padding:16px;max-width:1280px;margin:0 auto;}

.hero h1{
  font-family:var(--font-display);
  font-size:1.85rem;
  color:var(--gold);
  margin-bottom:20px;
  text-shadow:0 0 20px var(--gold-glow);
}

/* 統一的膠囊按鈕樣式 */
.chips{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:20px;
}
.filter-chip{
  padding:10px 20px;
  border-radius:var(--radius-full);
  border:1px solid var(--border);
  background:#1a170f;
  font-size:0.98rem;
  white-space:nowrap;
  transition:all var(--transition);
}
.filter-chip.active{
  background:var(--gold);
  color:#111;
  border-color:var(--gold);
  box-shadow:0 0 18px var(--gold-glow);
}

/* 卡片 */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(168px, 1fr));
  gap:14px;
}
.general-card{
  background:var(--surface-2);
  border:1px solid var(--border);
  border-radius:18px;
  overflow:hidden;
  box-shadow:var(--shadow-card);
  transition:all var(--transition);
}
.general-card:hover{
  transform:translateY(-6px);
  border-color:var(--gold);
}
.rarity-bar{height:5px;}
.rarity-bar.five-star{background:linear-gradient(90deg,#f4a261,#e76f51);}
.rarity-bar.hou{background:linear-gradient(90deg,#c44569,#9b59b6);}

.card-art{height:195px;overflow:hidden;}
.card-art img{width:100%;height:100%;object-fit:cover;}
.card-body{padding:14px;}
.card-name{
  font-family:var(--font-display);
  font-size:1.18rem;
  margin-bottom:8px;
  line-height:1.3;
}
.card-tags{
  display:flex;flex-wrap:wrap;gap:6px;
  margin-bottom:10px;
}
.tag{
  font-size:0.78rem;
  padding:4px 10px;
  border-radius:9999px;
  background:#242015;
  border:1px solid var(--border);
}

.no-results{
  text-align:center;
  color:var(--text-muted);
  padding:80px 20px;
  font-size:1.1rem;
}

/* Modal 技能樣式 */
.modal{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.94);
  display:none;align-items:center;justify-content:center;
  padding:16px;
  z-index:1000;
}
.modal.open{display:flex;}
.modal-panel{
  width:100%;
  max-width:540px;
  max-height:94dvh;
  overflow:auto;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
}
.modal-content{padding:20px;}

.skill-group{margin-bottom:28px;}
.skill-group-title{
  color:var(--gold);
  font-family:var(--font-display);
  font-size:1.25rem;
  margin-bottom:12px;
}
.skill-list{gap:14px;display:flex;flex-direction:column;}

.skill-item{
  background:var(--surface-2);
  border:1px solid rgba(232,192,112,0.3);
  border-radius:16px;
  padding:18px;
  box-shadow:0 0 15px rgba(232,192,112,0.15);
}
.skill-item:hover{border-color:var(--gold); box-shadow:0 0 25px var(--gold-glow);}
.skill-item.lord{border-color:#ffcc66; background:linear-gradient(180deg,#2a2418,var(--surface-2));}

.skill-top{display:flex; align-items:center; gap:14px; margin-bottom:12px;}
.skill-icon{
  width:52px; height:52px;
  background:linear-gradient(135deg,#e8c070,#d4a843);
  border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  font-size:1.75rem; flex-shrink:0;
  box-shadow:0 0 14px rgba(232,192,112,0.5);
  border:1px solid rgba(255,255,255,0.25);
}
.skill-name{
  font-family:var(--font-display);
  font-size:1.28rem;
  font-weight:700;
  color:var(--gold);
  text-shadow:0 0 10px var(--gold-glow);
  flex:1;
}
.skill-type{
  font-size:0.82rem;
  padding:4px 14px;
  border-radius:9999px;
  background:rgba(232,192,112,0.15);
  color:var(--gold);
  border:1px solid var(--gold);
}
.skill-meta{
  color:#e8c070;
  font-size:0.98rem;
  margin-bottom:12px;
  font-weight:500;
}
.skill-desc{
  color:var(--text-muted);
  font-size:0.96rem;
  line-height:1.7;
  white-space:pre-line;
}
</style>
</head>
<body>

<header>
  <a class="logo" href="#">
    <svg viewBox="0 0 28 28" fill="none" aria-label="真三國大戰2">
      <polygon points="14,2 26,8 26,20 14,26 2,20 2,8" stroke="currentColor" stroke-width="1.5" fill="none"/>
      <polygon points="14,6 22,10 22,18 14,22 6,18 6,10" stroke="currentColor" stroke-width="0.8" fill="none" opacity="0.5"/>
      <text x="14" y="18.5" text-anchor="middle" font-size="10" fill="currentColor" font-weight="bold" font-family="serif">将</text>
    </svg>
    真三國大戰2
  </a>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="searchInput" type="text" placeholder="搜尋武將名稱、前綴">
  </div>
  <button class="theme-toggle" id="themeToggle">🌓</button>
</header>

<main>
  <div class="hero">
    <h1>武將圖鑒</h1>
  </div>

  <!-- 第一行：派系 -->
  <div class="chips" id="factionChips">
    <button class="filter-chip active" data-faction="all">全部</button>
    <button class="filter-chip" data-faction="wei">魏</button>
    <button class="filter-chip" data-faction="shu">蜀</button>
    <button class="filter-chip" data-faction="wu">吳</button>
    <button class="filter-chip" data-faction="qun">群</button>
  </div>

  <!-- 第二行：形態、兵種、職業（改成膠囊按鈕） -->
  <div class="chips" id="formChips">
    <button class="filter-chip active" data-form="all">全部</button>
    <button class="filter-chip" data-form="五星">五星</button>
    <button class="filter-chip" data-form="拜將">拜將</button>
    <button class="filter-chip" data-form="封侯">封侯</button>
  </div>

  <div class="chips" id="troopChips"></div>
  <div class="chips" id="careerChips"></div>

  <section class="grid" id="generalGrid"></section>
  <div class="no-results" id="noResults">🔍 目前沒有符合條件的武將</div>
</main>

<div class="modal" id="detailModal">
  <div class="modal-panel">
    <div class="modal-content">
      <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:20px;">
        <div>
          <div id="modalFaction" style="color:#a38b6b;margin-bottom:6px;font-size:1.05rem;"></div>
          <div id="modalTitle" style="font-size:1.65rem;color:var(--gold);font-family:var(--font-display);"></div>
        </div>
        <button id="modalClose" style="background:none;border:none;font-size:2rem;color:#888;padding:0 8px;">✕</button>
      </div>

      <p style="color:var(--gold);margin:20px 0 12px;font-size:1.1rem;">卡片屬性</p>
      <div id="modalAttrs" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:30px;"></div>

      <p style="color:var(--gold);margin:20px 0 12px;font-size:1.1rem;">技能</p>
      <div id="modalSkills"></div>
    </div>
  </div>
</div>

<script src="hero/generals-data.js"></script>
<script>
// ====================== 全局變數 ======================
const factionMap = { all: "全部", wei: "魏", shu: "蜀", wu: "吳", qun: "群" };

let activeFaction = "all";
let activeForm = "all";
let activeTroop = "all";
let activeCareer = "all";
let searchQuery = "";

// ====================== 工具函式 ======================
function getDisplayName(name) {
  return name.replace(/^(五星·|封侯·|拜將·)/, '');
}

function uniqueValues(key) {
  return [...new Set(generals.map(g => g[key]).filter(Boolean))];
}

function createChipGroup(containerId, values, dataAttr, activeValue) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';

  // 加入「全部」
  const allBtn = document.createElement('button');
  allBtn.className = `filter-chip ${activeValue === 'all' ? 'active' : ''}`;
  allBtn.textContent = '全部';
  allBtn.dataset[dataAttr] = 'all';
  container.appendChild(allBtn);

  values.forEach(v => {
    const btn = document.createElement('button');
    btn.className = `filter-chip ${v === activeValue ? 'active' : ''}`;
    btn.textContent = v;
    btn.dataset[dataAttr] = v;
    container.appendChild(btn);
  });

  // 綁定點擊事件
  container.querySelectorAll('.filter-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      container.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      
      if (dataAttr === 'faction') activeFaction = btn.dataset.faction;
      if (dataAttr === 'form') activeForm = btn.dataset.form;
      if (dataAttr === 'troop') activeTroop = btn.dataset.troop;
      if (dataAttr === 'career') activeCareer = btn.dataset.career;
      
      applyFilters();
    });
  });
}

// ====================== 渲染卡片 ======================
function renderCards(list) {
  const grid = document.getElementById("generalGrid");
  const noRes = document.getElementById("noResults");

  if (!list.length) {
    grid.innerHTML = "";
    noRes.style.display = "block";
    return;
  }

  noRes.style.display = "none";
  grid.innerHTML = list.map(g => `
    <article class="general-card" data-id="${g.id}" role="listitem" tabindex="0">
      <div class="rarity-bar ${g.form === '五星' ? 'five-star' : g.form === '封侯' ? 'hou' : ''}"></div>
      <div class="card-art">
        ${g.image ? `<img src="${g.image}" alt="${getDisplayName(g.name)}">` : "🛡️"}
      </div>
      <div class="card-body">
        <div class="card-name">${getDisplayName(g.name)}</div>
        <div class="card-tags">
          <span class="tag">${factionMap[g.faction] || g.faction}</span>
          <span class="tag">${g.form}</span>
          <span class="tag">${g.troop}</span>
          <span class="tag">${g.career}</span>
        </div>
        <div class="card-meta">
          <span class="tag">${g.prefix || '無'}</span>
        </div>
        <div class="card-desc">${g.bio || ''}</div>
      </div>
    </article>
  `).join("");
}

// ====================== 技能渲染 ======================
function renderSkillItem(skill, isLord = false) {
  if (!skill) return '';
  const lordClass = isLord ? ' lord' : '';
  let icon = '⚔️';
  if (isLord) icon = '👑';
  else if (skill.type?.includes('主動')) icon = '🔥';
  else if (skill.type?.includes('被動')) icon = '🛡️';

  return `
    <div class="skill-item${lordClass}">
      <div class="skill-top">
        <div class="skill-icon">${icon}</div>
        <div style="flex:1">
          <div class="skill-name">${skill.name}</div>
          <div class="skill-type">${skill.type || "技能"}</div>
        </div>
      </div>
      ${(skill.cost || skill.cooldown) ? `
      <div class="skill-meta">
        消耗：${skill.cost || '-'}　　冷卻：${skill.cooldown || '-'}
      </div>` : ''}
      <div class="skill-desc">${skill.desc || ''}</div>
    </div>
  `;
}

function buildSkillSections(g) {
  let html = '';
  if (g.form === "封侯" && g.skills?.lord) {
    html += renderSkillGroup("主公技", [g.skills.lord], true);
  }
  if (g.skills?.active) {
    html += renderSkillGroup("主動技", [g.skills.active]);
  }
  if (g.skills?.passives?.length) {
    html += renderSkillGroup("被動技", g.skills.passives);
  }
  return html;
}

function renderSkillGroup(title, items, isLordGroup = false) {
  if (!items || !items.length) return '';
  return `
    <section class="skill-group">
      <div class="skill-group-title">${title}</div>
      <div class="skill-list">
        ${items.map(item => renderSkillItem(item, isLordGroup)).join("")}
      </div>
    </section>
  `;
}

// ====================== Modal ======================
function openModal(id) {
  const g = generals.find(item => item.id === id);
  if (!g) return;

  document.getElementById("modalFaction").textContent = `${factionMap[g.faction] || g.faction}｜${g.form}`;
  document.getElementById("modalTitle").textContent = getDisplayName(g.name);

  document.getElementById("modalAttrs").innerHTML = `
    <div style="background:#1f1b14;border:1px solid var(--border);border-radius:12px;padding:14px;">
      <div style="color:var(--text-muted);font-size:0.9rem;">職業</div>
      <div style="font-weight:700;">${g.career || "-"}</div>
    </div>
    <div style="background:#1f1b14;border:1px solid var(--border);border-radius:12px;padding:14px;">
      <div style="color:var(--text-muted);font-size:0.9rem;">資質</div>
      <div style="font-weight:700;">${g.aptitude || "-"}</div>
    </div>
    <div style="background:#1f1b14;border:1px solid var(--border);border-radius:12px;padding:14px;">
      <div style="color:var(--text-muted);font-size:0.9rem;">前綴</div>
      <div style="font-weight:700;">${g.prefix || "-"}</div>
    </div>
    <div style="background:#1f1b14;border:1px solid var(--border);border-radius:12px;padding:14px;">
      <div style="color:var(--text-muted);font-size:0.9rem;">兵種</div>
      <div style="font-weight:700;">${g.troop || "-"}</div>
    </div>
  `;

  document.getElementById("modalSkills").innerHTML = buildSkillSections(g);
  document.getElementById("detailModal").classList.add("open");
}

function closeModal() {
  document.getElementById("detailModal").classList.remove("open");
}

// ====================== 篩選 ======================
function applyFilters() {
  const q = searchQuery.trim().toLowerCase();
  const filtered = generals.filter(g => {
    const matchFaction = activeFaction === "all" || g.faction === activeFaction;
    const matchForm = activeForm === "all" || g.form === activeForm;
    const matchTroop = activeTroop === "all" || g.troop === activeTroop;
    const matchCareer = activeCareer === "all" || g.career === activeCareer;
    const haystack = [g.name, g.prefix, g.troop, g.career, g.form, g.bio].join(" ").toLowerCase();
    const matchSearch = !q || haystack.includes(q);
    return matchFaction && matchForm && matchTroop && matchCareer && matchSearch;
  });
  renderCards(filtered);
}

// ====================== 初始化 ======================
function initApp() {
  if (typeof generals === "undefined" || !Array.isArray(generals)) {
    console.error("❌ generals-data.js 載入失敗！");
    return;
  }

  // 建立各個膠囊群組
  createChipGroup("factionChips", [], "faction", "all");   // 派系已在 HTML 寫好
  createChipGroup("formChips", ["五星","拜將","封侯"], "form", "all");
  createChipGroup("troopChips", uniqueValues("troop"), "troop", "all");
  createChipGroup("careerChips", uniqueValues("career"), "career", "all");

  applyFilters();
}

// ====================== 事件綁定 ======================
document.addEventListener("DOMContentLoaded", initApp);

document.getElementById("searchInput").addEventListener("input", e => {
  searchQuery = e.target.value;
  applyFilters();
});

document.getElementById("generalGrid").addEventListener("click", e => {
  const card = e.target.closest(".general-card");
  if (card) openModal(parseInt(card.dataset.id, 10));
});

document.getElementById("modalClose").addEventListener("click", closeModal);
document.getElementById("detailModal").addEventListener("click", e => {
  if (e.target.id === "detailModal") closeModal();
});
document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeModal();
});

document.getElementById("themeToggle").addEventListener("click", () => {
  const html = document.documentElement;
  html.dataset.theme = html.dataset.theme === "dark" ? "light" : "dark";
});
</script>
</body>
</html>
