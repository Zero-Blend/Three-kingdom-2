<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>真三國大戰2｜武將圖鑒</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --font-display:'Noto Serif TC',serif;
  --font-body:'Satoshi',sans-serif;
  --text-xs:clamp(0.75rem,0.7rem + 0.25vw,0.875rem);
  --text-sm:clamp(0.875rem,0.8rem + 0.35vw,1rem);
  --text-base:clamp(1rem,0.95rem + 0.25vw,1.125rem);
  --text-lg:clamp(1.125rem,1rem + 0.75vw,1.5rem);
  --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
  --space-1:0.25rem; --space-2:0.5rem; --space-3:0.75rem;
  --space-4:1rem; --space-6:1.5rem; --space-8:2rem;
  --space-10:2.5rem; --space-12:3rem;
  --radius-sm:0.375rem; --radius-md:0.5rem; --radius-lg:0.75rem;
  --radius-xl:1rem; --radius-full:9999px;
  --transition:180ms cubic-bezier(0.16,1,0.3,1);
}
[data-theme="dark"]{
  --bg:#0d0c0a;
  --surface:#161410;
  --surface-2:#1e1b16;
  --surface-3:#28241c;
  --border:rgba(255,220,120,0.12);
  --divider:rgba(255,220,120,0.08);
  --text:#e8dfc8;
  --text-muted:#9c9080;
  --text-faint:#5a5448;
  --gold:#d4a843;
  --gold-glow:rgba(212,168,67,0.25);
  --red:#c0392b;
  --blue-faction:#2471a3;
  --green-faction:#1e8449;
  --shadow-card:0 4px 24px rgba(0,0,0,0.5);
  --shadow-glow:0 0 20px rgba(212,168,67,0.2);
}
[data-theme="light"]{
  --bg:#f5f0e8;
  --surface:#faf6ee;
  --surface-2:#ffffff;
  --surface-3:#ede8dc;
  --border:rgba(120,80,0,0.15);
  --divider:rgba(120,80,0,0.1);
  --text:#2c1f0a;
  --text-muted:#7a6040;
  --text-faint:#b8a080;
  --gold:#a0720a;
  --gold-glow:rgba(160,114,10,0.15);
  --red:#922b21;
  --blue-faction:#1a5276;
  --green-faction:#1a5e36;
  --shadow-card:0 4px 20px rgba(80,40,0,0.15);
  --shadow-glow:0 0 16px rgba(160,114,10,0.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;}
body{
  font-family:var(--font-body);
  font-size:var(--text-base);
  color:var(--text);
  background:var(--bg);
  min-height:100dvh;
  line-height:1.6;
}
img{display:block;max-width:100%;height:auto;}
button,select,input{font:inherit;color:inherit;}
button{cursor:pointer;background:none;border:none;}
:focus-visible{outline:2px solid var(--gold);outline-offset:3px;border-radius:var(--radius-sm);}

header{
  position:sticky;top:0;z-index:100;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  padding:var(--space-3) var(--space-4);
  display:flex;align-items:center;gap:var(--space-3);
}
.logo{
  display:flex;align-items:center;gap:var(--space-2);
  text-decoration:none;color:var(--gold);
  font-family:var(--font-display);font-size:var(--text-lg);font-weight:700;
  letter-spacing:0.05em;text-shadow:0 0 12px var(--gold-glow);flex-shrink:0;
}
.search-wrap{flex:1;position:relative;min-width:0;}
.search-wrap input{
  width:100%;padding:var(--space-2) var(--space-3) var(--space-2) 2.4rem;
  background:var(--surface-3);border:1px solid var(--border);
  border-radius:var(--radius-full);outline:none;
}
.search-wrap .search-icon{
  position:absolute;left:0.75rem;top:50%;transform:translateY(-50%);
  opacity:0.7;
}
.theme-toggle{
  display:inline-flex;align-items:center;justify-content:center;
  width:2.6rem;height:2.6rem;border:1px solid var(--border);
  border-radius:var(--radius-full);background:var(--surface-3);
}

main{max-width:1280px;margin:0 auto;padding:var(--space-6) var(--space-4) var(--space-12);}
.hero{margin-bottom:var(--space-6);}
.hero h1{
  font-family:var(--font-display);
  font-size:var(--text-xl);
  color:var(--gold);
  margin-bottom:var(--space-2);
}
.hero p{color:var(--text-muted);}

.filters{
  display:flex;flex-wrap:wrap;gap:var(--space-3);
  margin-bottom:var(--space-6);
}
.filter-group{
  display:flex;align-items:center;gap:var(--space-2);
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-full);
  padding:0.45rem 0.85rem;
}
.filter-group label{
  color:var(--text-muted);
  font-size:var(--text-sm);
}
.filter-group select{
  background:transparent;
  border:none;
  outline:none;
  min-width:88px;
}

.chips{
  display:flex;flex-wrap:wrap;gap:var(--space-2);
  margin-bottom:var(--space-6);
}
.filter-chip{
  padding:0.5rem 0.9rem;
  border-radius:var(--radius-full);
  border:1px solid var(--border);
  background:var(--surface);
  transition:all var(--transition);
}
.filter-chip.active,.filter-chip:hover{
  border-color:var(--gold);
  color:var(--gold);
  box-shadow:var(--shadow-glow);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(290px,1fr));
  gap:var(--space-4);
}
.general-card{
  background:linear-gradient(180deg,var(--surface-2),var(--surface));
  border:1px solid var(--border);
  border-radius:var(--radius-xl);
  overflow:hidden;
  box-shadow:var(--shadow-card);
  transition:transform var(--transition), border-color var(--transition), box-shadow var(--transition);
}
.general-card:hover{
  transform:translateY(-3px);
  border-color:rgba(212,168,67,0.4);
  box-shadow:var(--shadow-card),var(--shadow-glow);
}
.rarity-bar{height:4px;background:linear-gradient(90deg,#7f8c8d,#bdc3c7);}
.rarity-15{background:linear-gradient(90deg,#8e44ad,#f1c40f);}
.card-art-placeholder{
  height:150px;
  display:flex;align-items:center;justify-content:center;
  font-size:3rem;
  background:radial-gradient(circle at center, rgba(212,168,67,0.12), transparent 70%);
}
.card-body{padding:var(--space-4);}
.card-name{
  font-family:var(--font-display);
  font-size:var(--text-lg);
  margin-bottom:var(--space-2);
}
.card-tags,.card-meta{
  display:flex;flex-wrap:wrap;gap:var(--space-2);
  margin-bottom:var(--space-3);
}
.tag{
  display:inline-flex;align-items:center;
  padding:0.25rem 0.6rem;
  border-radius:var(--radius-full);
  font-size:var(--text-xs);
  border:1px solid var(--border);
  background:var(--surface-3);
}
.tag-wei{color:#8ecbff;border-color:rgba(142,203,255,0.25);}
.tag-form{color:#f4d06f;}
.tag-troop{color:#c8e6a0;}
.tag-career{color:#f1b6ff;}
.card-desc{
  color:var(--text-muted);
  font-size:var(--text-sm);
  display:-webkit-box;
  -webkit-line-clamp:3;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

.no-results{
  text-align:center;
  color:var(--text-muted);
  padding:var(--space-10) 0;
  display:none;
}

.modal{
  position:fixed;inset:0;z-index:1000;
  display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.72);
  padding:var(--space-4);
}
.modal.open{display:flex;}
.modal-panel{
  width:min(920px,100%);
  max-height:90dvh;
  overflow:auto;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-xl);
  box-shadow:var(--shadow-card);
}
.modal-content{padding:var(--space-6);}
.modal-header{
  display:flex;justify-content:space-between;align-items:flex-start;gap:var(--space-3);
  margin-bottom:var(--space-4);
}
.modal-name{
  font-family:var(--font-display);
  font-size:var(--text-xl);
  color:var(--gold);
}
.modal-faction{
  color:var(--text-muted);
  margin-bottom:var(--space-1);
}
.modal-close{
  display:inline-flex;align-items:center;justify-content:center;
  width:2.5rem;height:2.5rem;border-radius:var(--radius-full);
  border:1px solid var(--border);background:var(--surface-3);
}
.section-title{
  color:var(--gold);
  font-family:var(--font-display);
  margin-bottom:var(--space-3);
}
.attr-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
  gap:var(--space-3);
  margin-bottom:var(--space-5);
}
.attr-item{
  background:var(--surface-2);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:var(--space-3);
}
.attr-item .label{
  color:var(--text-muted);
  font-size:var(--text-sm);
  margin-bottom:0.25rem;
}
.attr-item .value{
  color:var(--text);
  font-weight:700;
}

.skill-group{margin-bottom:var(--space-5);}
.skill-group-title{
  font-size:var(--text-base);
  color:var(--text);
  margin-bottom:var(--space-3);
}
.skill-list{
  display:grid;
  gap:var(--space-3);
}
.skill-item{
  background:var(--surface-2);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:var(--space-4);
}
.skill-top{
  display:flex;flex-wrap:wrap;align-items:center;gap:var(--space-2);
  margin-bottom:var(--space-2);
}
.skill-name{
  font-weight:700;
  color:var(--gold);
}
.skill-type{
  font-size:var(--text-xs);
  color:var(--text-muted);
  border:1px solid var(--border);
  border-radius:var(--radius-full);
  padding:0.15rem 0.5rem;
}
.skill-meta{
  color:var(--text-muted);
  font-size:var(--text-sm);
}
.skill-desc{
  white-space:pre-line;
  color:var(--text);
  font-size:var(--text-sm);
}
.footer-note{
  margin-top:var(--space-8);
  color:var(--text-faint);
  font-size:var(--text-sm);
}

@media (max-width: 720px){
  .filters{flex-direction:column;align-items:stretch;}
  .filter-group{justify-content:space-between;border-radius:var(--radius-lg);}
}
</style>
</head>
<body>
<header>
  <a href="#" class="logo">真三國大戰2｜武將圖鑒</a>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="searchInput" type="text" placeholder="搜尋武將名稱、前綴、兵種、職業">
  </div>
  <button class="theme-toggle" id="themeToggle" aria-label="切換主題">🌓</button>
</header>

<main>
  <section class="hero">
    <h1>武將圖鑒</h1>
    <p>支援普通、拜將、封侯三種形態；目前先收錄封侯·天命曹操。</p>
  </section>

  <div class="chips" id="factionChips">
    <button class="filter-chip active" data-faction="all">全部</button>
    <button class="filter-chip" data-faction="wei">魏</button>
    <button class="filter-chip" data-faction="shu">蜀</button>
    <button class="filter-chip" data-faction="wu">吳</button>
    <button class="filter-chip" data-faction="qun">群</button>
  </div>

  <section class="filters">
    <div class="filter-group">
      <label for="formFilter">形態</label>
      <select id="formFilter">
        <option value="all">全部</option>
        <option value="普通">普通</option>
        <option value="拜將">拜將</option>
        <option value="封侯">封侯</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="troopFilter">兵種</label>
      <select id="troopFilter">
        <option value="all">全部</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="careerFilter">職業</label>
      <select id="careerFilter">
        <option value="all">全部</option>
      </select>
    </div>
  </section>

  <section class="grid" id="generalGrid" role="list"></section>
  <div class="no-results" id="noResults">🔍 找不到符合條件的武將</div>

  <p class="footer-note">目前卡片屬性顯示：職業、資質、前綴、兵種；技能會依武將形態自動切換。</p>
</main>

<div class="modal" id="detailModal" aria-hidden="true">
  <div class="modal-panel">
    <div class="modal-content">
      <div class="modal-header">
        <div>
          <div class="modal-faction" id="modalFaction"></div>
          <div class="modal-name" id="modalTitle"></div>
        </div>
        <button class="modal-close" id="modalClose" aria-label="關閉">✕</button>
      </div>

      <p class="section-title">卡片屬性</p>
      <div class="attr-grid" id="modalAttrs"></div>

      <p class="section-title">技能</p>
      <div id="modalSkills"></div>
    </div>
  </div>
</div>

<script>
const generals = [
  {
    id: 1,
    name: "封侯·天命曹操",
    faction: "wei",
    form: "封侯",
    career: "策士型",
    aptitude: "15",
    prefix: "天命系列",
    troop: "戎車",
    emoji: "👑",
    bio: "魏國封侯形態法術核心，兼具主公技、聯動增幅、追擊輸出與團隊防護能力。",
    skills: {
      lord: {
        name: "究·UR集滅天之破",
        type: "主公技",
        cost: "2主公點",
        cooldown: "15秒",
        desc: `令己方策攻最高的2名友軍與自身集火距離最近的敵人。強征己方除自身外至多4名策攻高於物攻的主將各10%法術傷害加成自身，15秒後返還。
在持續時間內，被強征的友軍若屬於魏國則補償20%法術吸血，若為騎兵則補償20%受治療效果，若該友軍在此期間死亡，則不返還法術傷害且永久提升曹操10%法術吸血和受治療效果，最高疊加4層。
曹操的主動技能在持續時間內前2次釋放減少1點消耗。刷新己方魏國騎兵主將的主動技冷卻。`
      },
      active: {
        name: "究·SR高岩瞰天下",
        type: "主動技",
        cost: "2氣",
        cooldown: "5秒",
        desc: `在一定範圍內的最遠敵人(優先主將)周身凝聚霸氣並炸開，造成法術傷害。若周圍無人則對最近敵人釋放。
若目標為將軍型召喚物或三軍，則傷害倍率提升30%，且額外造成的傷害無法被分攤，並用造成法術傷害的50%對距離目標最近的敵方主將再次造成法術傷害。
若天命搭檔在自身附近，弱化目標60%受治療效果，並使其受到的普攻和法術傷害提升20%，持續10秒。
若目標及其周圍的敵人帶有血濁印記，則將其引爆並刷新印記時間。將其擊退並使其生命上限減少15%，最高3層(持續到戰鬥結束)。`
      },
      passives: [
        {
          name: "滄海",
          type: "被動",
          desc: `普攻時有概率號令己方每個策攻高於物攻的部隊(自身必然觸發)，對各自正在攻擊的目標造成一次法術傷害，每多一個執行者增加2倍傷害(眩暈或未進行戰鬥的部隊則不會執行)。
自身周圍每多一個騎兵，就增加自身5%的技能傷害，最高5層(會即時變動)。`
        },
        {
          name: "操戈",
          type: "被動",
          desc: `每次己方武將技能釋放完的2秒後，號令天命搭檔與自己一起對敵方生命百分比最低的單位發動一次齊射。各造成10倍物理與10倍法術傷害。
若觸發此效果的技能釋放者為自己或天命搭檔的話，則使傷害無視分攤。`
        },
        {
          name: "司命",
          type: "被動",
          desc: `開場時給己方全體附加自身10倍兵力的護盾，並提升15%的戰法免傷，持續15秒可疊加。
若己方有其他司命武將，發動聯合效果：
每當己方的司命武將釋放技能後，在10秒內提升自身30%的普攻抗性，最多兩層。
其他司命武將陣亡後，聯合效果變為亡語效果：一次性恢復30%的生命，且獲得20%的物理與法術抗性直至結束。`
        }
      ],
      strategy: [],
      followers: []
    }
  }
];

const factionMap = {
  all: { label: "全部" },
  wei: { label: "魏" },
  shu: { label: "蜀" },
  wu: { label: "吳" },
  qun: { label: "群" }
};

let activeFaction = "all";
let searchQuery = "";
let activeForm = "all";
let activeTroop = "all";
let activeCareer = "all";

function uniqueValues(key){
  return [...new Set(generals.map(g => g[key]).filter(Boolean))];
}

function fillSelectOptions(selectId, values){
  const select = document.getElementById(selectId);
  const current = select.value;
  select.innerHTML = `<option value="all">全部</option>` + values.map(v => `<option value="${v}">${v}</option>`).join("");
  if ([...select.options].some(opt => opt.value === current)) {
    select.value = current;
  }
}

function renderCards(list){
  const grid = document.getElementById("generalGrid");
  const noRes = document.getElementById("noResults");

  if(!list.length){
    grid.innerHTML = "";
    noRes.style.display = "block";
    return;
  }

  noRes.style.display = "none";
  grid.innerHTML = list.map(g => `
    <article class="general-card" data-id="${g.id}" role="listitem" tabindex="0">
      <div class="rarity-bar rarity-${g.aptitude}"></div>
      <div class="card-art-placeholder">${g.emoji || "🛡️"}</div>
      <div class="card-body">
        <div class="card-name">${g.name}</div>
        <div class="card-tags">
          <span class="tag tag-${g.faction}">${factionMap[g.faction]?.label || g.faction}</span>
          <span class="tag tag-form">${g.form}</span>
          <span class="tag tag-troop">${g.troop}</span>
          <span class="tag tag-career">${g.career}</span>
        </div>
        <div class="card-meta">
          <span class="tag">資質 ${g.aptitude}</span>
          <span class="tag">前綴 ${g.prefix}</span>
        </div>
        <div class="card-desc">${g.bio || ""}</div>
      </div>
    </article>
  `).join("");
}

function renderSkillItem(skill){
  return `
    <div class="skill-item">
      <div class="skill-top">
        <div class="skill-name">${skill.name}</div>
        <div class="skill-type">${skill.type || "技能"}</div>
      </div>
      ${(skill.cost || skill.cooldown) ? `<div class="skill-meta">消耗：${skill.cost || "-"}　冷卻：${skill.cooldown || "-"}</div>` : ""}
      <div class="skill-desc">${skill.desc || ""}</div>
    </div>
  `;
}

function renderSkillGroup(title, items){
  if(!items || !items.length) return "";
  return `
    <section class="skill-group">
      <div class="skill-group-title">${title}</div>
      <div class="skill-list">
        ${items.map(renderSkillItem).join("")}
      </div>
    </section>
  `;
}

function buildSkillSections(g){
  const groups = [];
  if(g.form === "封侯" && g.skills.lord){
    groups.push(renderSkillGroup("主公技", [g.skills.lord]));
  }
  if(g.skills.active){
    groups.push(renderSkillGroup("主動技", [g.skills.active]));
  }
  if(g.skills.passives?.length){
    groups.push(renderSkillGroup("被動技", g.skills.passives));
  }
  if(g.form === "拜將" && g.skills.strategy?.length){
    groups.push(renderSkillGroup("將略技", g.skills.strategy));
  }
  if(g.form === "拜將" && g.skills.followers?.length){
    groups.push(renderSkillGroup("隨從技能", g.skills.followers));
  }
  return groups.join("");
}

function openModal(id){
  const g = generals.find(item => item.id === id);
  if(!g) return;

  document.getElementById("modalFaction").textContent = `${factionMap[g.faction]?.label || g.faction}｜${g.form}`;
  document.getElementById("modalTitle").textContent = g.name;

  document.getElementById("modalAttrs").innerHTML = `
    <div class="attr-item"><div class="label">職業</div><div class="value">${g.career || "-"}</div></div>
    <div class="attr-item"><div class="label">資質</div><div class="value">${g.aptitude || "-"}</div></div>
    <div class="attr-item"><div class="label">前綴</div><div class="value">${g.prefix || "-"}</div></div>
    <div class="attr-item"><div class="label">兵種</div><div class="value">${g.troop || "-"}</div></div>
  `;

  document.getElementById("modalSkills").innerHTML = buildSkillSections(g);
  document.getElementById("detailModal").classList.add("open");
  document.getElementById("detailModal").setAttribute("aria-hidden", "false");
}

function closeModal(){
  document.getElementById("detailModal").classList.remove("open");
  document.getElementById("detailModal").setAttribute("aria-hidden", "true");
}

function applyFilters(){
  const q = searchQuery.trim().toLowerCase();

  const list = generals.filter(g => {
    const matchFaction = activeFaction === "all" || g.faction === activeFaction;
    const matchForm = activeForm === "all" || g.form === activeForm;
    const matchTroop = activeTroop === "all" || g.troop === activeTroop;
    const matchCareer = activeCareer === "all" || g.career === activeCareer;

    const haystack = [
      g.name, g.prefix, g.troop, g.career, g.form,
      factionMap[g.faction]?.label || "", g.bio
    ].join(" ").toLowerCase();

    const matchSearch = !q || haystack.includes(q);

    return matchFaction && matchForm && matchTroop && matchCareer && matchSearch;
  });

  renderCards(list);
}

document.getElementById("searchInput").addEventListener("input", e => {
  searchQuery = e.target.value;
  applyFilters();
});

document.querySelectorAll(".filter-chip").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-chip").forEach(el => el.classList.remove("active"));
    btn.classList.add("active");
    activeFaction = btn.dataset.faction;
    applyFilters();
  });
});

document.getElementById("formFilter").addEventListener("change", e => {
  activeForm = e.target.value;
  applyFilters();
});

document.getElementById("troopFilter").addEventListener("change", e => {
  activeTroop = e.target.value;
  applyFilters();
});

document.getElementById("careerFilter").addEventListener("change", e => {
  activeCareer = e.target.value;
  applyFilters();
});

document.getElementById("generalGrid").addEventListener("click", e => {
  const card = e.target.closest(".general-card");
  if(card) openModal(Number(card.dataset.id));
});

document.getElementById("generalGrid").addEventListener("keydown", e => {
  if(e.key !== "Enter" && e.key !== " ") return;
  const card = e.target.closest(".general-card");
  if(card){
    e.preventDefault();
    openModal(Number(card.dataset.id));
  }
});

document.getElementById("modalClose").addEventListener("click", closeModal);
document.getElementById("detailModal").addEventListener("click", e => {
  if(e.target.id === "detailModal") closeModal();
});
document.addEventListener("keydown", e => {
  if(e.key === "Escape") closeModal();
});

document.getElementById("themeToggle").addEventListener("click", () => {
  const html = document.documentElement;
  html.dataset.theme = html.dataset.theme === "dark" ? "light" : "dark";
});

fillSelectOptions("troopFilter", uniqueValues("troop"));
fillSelectOptions("careerFilter", uniqueValues("career"));
applyFilters();
</script>
</body>
</html>
