<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>真三國大戰2｜武將圖鑒</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --font-display:'Noto Serif TC',serif;
  --font-body:'Satoshi',sans-serif;
  --text-xs:clamp(0.75rem,0.7rem + 0.25vw,0.875rem);
  --text-sm:clamp(0.875rem,0.8rem + 0.35vw,1rem);
  --text-base:clamp(1rem,0.95rem + 0.25vw,1.125rem);
  --text-lg:clamp(1.125rem,1rem + 0.75vw,1.5rem);
  --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
  --space-1:0.25rem; --space-2:0.5rem; --space-3:0.75rem;
  --space-4:1rem; --space-6:1.5rem; --space-8:2rem;
  --space-10:2.5rem; --space-12:3rem;
  --radius-sm:0.375rem; --radius-md:0.5rem; --radius-lg:0.75rem;
  --radius-xl:1rem; --radius-full:9999px;
  --transition:180ms cubic-bezier(0.16,1,0.3,1);
}
[data-theme="dark"]{
  --bg:#0d0c0a;
  --surface:#161410;
  --surface-2:#1e1b16;
  --surface-3:#28241c;
  --border:rgba(255,220,120,0.12);
  --divider:rgba(255,220,120,0.08);
  --text:#e8dfc8;
  --text-muted:#9c9080;
  --text-faint:#5a5448;
  --gold:#d4a843;
  --gold-glow:rgba(212,168,67,0.25);
  --shadow-card:0 4px 24px rgba(0,0,0,0.5);
  --shadow-glow:0 0 20px rgba(212,168,67,0.2);
}
[data-theme="light"]{
  --bg:#f5f0e8;
  --surface:#faf6ee;
  --surface-2:#ffffff;
  --surface-3:#ede8dc;
  --border:rgba(120,80,0,0.15);
  --divider:rgba(120,80,0,0.1);
  --text:#2c1f0a;
  --text-muted:#7a6040;
  --text-faint:#b8a080;
  --gold:#a0720a;
  --gold-glow:rgba(160,114,10,0.15);
  --shadow-card:0 4px 20px rgba(80,40,0,0.15);
  --shadow-glow:0 0 16px rgba(160,114,10,0.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;}
body{
  font-family:var(--font-body);
  font-size:var(--text-base);
  color:var(--text);
  background:var(--bg);
  min-height:100dvh;
  line-height:1.6;
}
button,input,select{font:inherit;color:inherit;}
button{cursor:pointer;background:none;border:none;}
img{display:block;max-width:100%;height:auto;}
:focus-visible{outline:2px solid var(--gold);outline-offset:3px;border-radius:var(--radius-sm);}
header{
  position:sticky;top:0;z-index:100;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:var(--space-3) var(--space-4);
  display:flex;align-items:center;gap:var(--space-3);
}
.logo{
  display:flex;align-items:center;gap:var(--space-2);
  text-decoration:none;color:var(--gold);
  font-family:var(--font-display);font-size:var(--text-lg);font-weight:700;
  letter-spacing:0.05em;text-shadow:0 0 12px var(--gold-glow);
  flex-shrink:0;
}
.logo svg{width:28px;height:28px;flex-shrink:0;}
.search-wrap{flex:1;position:relative;min-width:0;}
.search-wrap input{
  width:100%;
  padding:var(--space-2) var(--space-3) var(--space-2) 2.4rem;
  border-radius:var(--radius-full);
  border:1px solid var(--border);
  background:var(--surface-3);
  outline:none;
}
.search-icon{
  position:absolute;left:0.8rem;top:50%;transform:translateY(-50%);
  opacity:0.7;
}
.theme-toggle{
  width:2.6rem;height:2.6rem;border-radius:var(--radius-full);
  border:1px solid var(--border);background:var(--surface-3);
}
main{
  max-width:1280px;
  margin:0 auto;
  padding:var(--space-6) var(--space-4) var(--space-12);
}
.hero{margin-bottom:var(--space-6);}
.hero h1{
  font-family:var(--font-display);
  font-size:var(--text-xl);
  color:var(--gold);
  margin-bottom:var(--space-2);
}
.hero p{color:var(--text-muted);}
.chips{
  display:flex;flex-wrap:wrap;gap:var(--space-2);
  margin-bottom:var(--space-4);
}
.filter-chip{
  padding:0.5rem 0.9rem;
  border-radius:var(--radius-full);
  border:1px solid var(--border);
  background:var(--surface);
}
.filter-chip.active{
  border-color:var(--gold);
  color:var(--gold);
  box-shadow:var(--shadow-glow);
}
.filters{
  display:flex;flex-wrap:wrap;gap:var(--space-3);
  margin-bottom:var(--space-6);
}
.filter-group{
  display:flex;align-items:center;gap:var(--space-2);
  border:1px solid var(--border);
  background:var(--surface);
  border-radius:var(--radius-full);
  padding:0.45rem 0.8rem;
}
.filter-group label{
  color:var(--text-muted);
  font-size:var(--text-sm);
}
.filter-group select{
  background:transparent;
  border:none;
  outline:none;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(290px,1fr));
  gap:var(--space-4);
}
.general-card{
  background:linear-gradient(180deg,var(--surface-2),var(--surface));
  border:1px solid var(--border);
  border-radius:var(--radius-xl);
  overflow:hidden;
  box-shadow:var(--shadow-card);
  transition:transform var(--transition), border-color var(--transition);
}
.general-card:hover{
  transform:translateY(-3px);
  border-color:rgba(212,168,67,0.35);
}
.rarity-bar{height:4px;background:linear-gradient(90deg,#8e44ad,#f1c40f);}
.card-art{
  height:150px;
  display:flex;align-items:center;justify-content:center;
  font-size:3rem;
  background:radial-gradient(circle at center, rgba(212,168,67,0.12), transparent 70%);
}
.card-body{padding:var(--space-4);}
.card-name{
  font-family:var(--font-display);
  font-size:var(--text-lg);
  margin-bottom:var(--space-2);
}
.card-tags,.card-meta{
  display:flex;flex-wrap:wrap;gap:var(--space-2);
  margin-bottom:var(--space-3);
}
.tag{
  display:inline-flex;align-items:center;
  padding:0.25rem 0.6rem;
  border-radius:var(--radius-full);
  font-size:var(--text-xs);
  border:1px solid var(--border);
  background:var(--surface-3);
}
.card-desc{
  color:var(--text-muted);
  font-size:var(--text-sm);
  display:-webkit-box;
  -webkit-line-clamp:3;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
.no-results{
  display:none;
  text-align:center;
  color:var(--text-muted);
  padding:var(--space-10) 0;
}
.modal{
  position:fixed;inset:0;z-index:1000;
  display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.72);
  padding:var(--space-4);
}
.modal.open{display:flex;}
.modal-panel{
  width:min(920px,100%);
  max-height:90dvh;
  overflow:auto;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-xl);
}
.modal-content{padding:var(--space-6);}
.modal-header{
  display:flex;justify-content:space-between;align-items:flex-start;gap:var(--space-3);
  margin-bottom:var(--space-4);
}
.modal-name{
  font-family:var(--font-display);
  font-size:var(--text-xl);
  color:var(--gold);
}
.modal-faction{color:var(--text-muted);margin-bottom:var(--space-1);}
.modal-close{
  width:2.5rem;height:2.5rem;border-radius:var(--radius-full);
  border:1px solid var(--border);background:var(--surface-3);
}
.section-title{
  color:var(--gold);
  font-family:var(--font-display);
  margin-bottom:var(--space-3);
}
.attr-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
  gap:var(--space-3);
  margin-bottom:var(--space-6);
}
.attr-item{
  background:var(--surface-2);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:var(--space-3);
}
.attr-item .label{
  color:var(--text-muted);
  font-size:var(--text-sm);
  margin-bottom:0.25rem;
}
.attr-item .value{font-weight:700;}
.skill-group{margin-bottom:var(--space-5);}
.skill-group-title{
  font-size:var(--text-base);
  margin-bottom:var(--space-3);
}
.skill-list{
  display:grid;
  gap:var(--space-3);
}
.skill-item{
  background:var(--surface-2);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:var(--space-4);
}
.skill-top{
  display:flex;flex-wrap:wrap;gap:var(--space-2);
  margin-bottom:var(--space-2);
}
.skill-name{font-weight:700;color:var(--gold);}
.skill-type{
  font-size:var(--text-xs);
  color:var(--text-muted);
  border:1px solid var(--border);
  border-radius:var(--radius-full);
  padding:0.15rem 0.5rem;
}
.skill-meta{
  color:var(--text-muted);
  font-size:var(--text-sm);
  margin-bottom:var(--space-2);
}
.skill-desc{
  white-space:pre-line;
  font-size:var(--text-sm);
}
@media (max-width:720px){
  .filters{flex-direction:column;align-items:stretch;}
  .filter-group{justify-content:space-between;border-radius:var(--radius-lg);}
}
</style>
</head>
<body>
<header>
  <a class="logo" href="#">
    <svg viewBox="0 0 28 28" fill="none" aria-label="真三國大戰2">
      <polygon points="14,2 26,8 26,20 14,26 2,20 2,8" stroke="currentColor" stroke-width="1.5" fill="none"/>
      <polygon points="14,6 22,10 22,18 14,22 6,18 6,10" stroke="currentColor" stroke-width="0.8" fill="none" opacity="0.5"/>
      <text x="14" y="18.5" text-anchor="middle" font-size="10" fill="currentColor" font-weight="bold" font-family="serif">将</text>
    </svg>
    真三國大戰2
  </a>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="searchInput" type="text" placeholder="搜尋武將名稱、前綴、兵種、職業">
  </div>
  <button class="theme-toggle" id="themeToggle" aria-label="切換主題">🌓</button>
</header>
<main>
  <section class="hero">
    <h1>武將圖鑒</h1>
  </section>
  <div class="chips">
    <button class="filter-chip active" data-faction="all">全部</button>
    <button class="filter-chip" data-faction="wei">魏</button>
    <button class="filter-chip" data-faction="shu">蜀</button>
    <button class="filter-chip" data-faction="wu">吳</button>
    <button class="filter-chip" data-faction="qun">群</button>
  </div>
  <section class="filters">
    <div class="filter-group">
      <label for="formFilter">形態</label>
      <select id="formFilter">
        <option value="all">全部</option>
        <option value="普通">普通</option>
        <option value="拜將">拜將</option>
        <option value="封侯">封侯</option>
      </select>
    </div>
    <div class="filter-group">
      <label for="troopFilter">兵種</label>
      <select id="troopFilter">
        <option value="all">全部</option>
      </select>
    </div>
    <div class="filter-group">
      <label for="careerFilter">職業</label>
      <select id="careerFilter">
        <option value="all">全部</option>
      </select>
    </div>
  </section>
  <section class="grid" id="generalGrid" role="list"></section>
  <div class="no-results" id="noResults">🔍 找不到符合條件的武將</div>
</main>
<div class="modal" id="detailModal" aria-hidden="true">
  <div class="modal-panel">
    <div class="modal-content">
      <div class="modal-header">
        <div>
          <div class="modal-faction" id="modalFaction"></div>
          <div class="modal-name" id="modalTitle"></div>
        </div>
        <button class="modal-close" id="modalClose" aria-label="關閉">✕</button>
      </div>
      <p class="section-title">卡片屬性</p>
      <div class="attr-grid" id="modalAttrs"></div>
      <p class="section-title">技能</p>
      <div id="modalSkills"></div>
    </div>
  </div>
</div>
<script src="generals-data.js"></script>
<script>
const factionMap = {
  all: { label: "全部" },
  wei: { label: "魏" },
  shu: { label: "蜀" },
  wu: { label: "吳" },
  qun: { label: "群" }
};
let activeFaction = "all";
let activeForm = "all";
let activeTroop = "all";
let activeCareer = "all";
let searchQuery = "";
function uniqueValues(key){
  return [...new Set(generals.map(g => g[key]).filter(Boolean))];
}
function fillSelectOptions(selectId, values){
  const select = document.getElementById(selectId);
  select.innerHTML = `<option value="all">全部</option>` + values.map(v => `<option value="${v}">${v}</option>`).join("");
}
function renderCards(list){
  const grid = document.getElementById("generalGrid");
  const noRes = document.getElementById("noResults");
  if(!list.length){
    grid.innerHTML = "";
    noRes.style.display = "block";
    return;
  }
  noRes.style.display = "none";
  grid.innerHTML = list.map(g => `
    <article class="general-card" data-id="${g.id}" role="listitem" tabindex="0">
      <div class="rarity-bar"></div>
      <div class="card-art">${g.emoji || "🛡️"}</div>
      <div class="card-body">
        <div class="card-name">${g.name}</div>
        <div class="card-tags">
          <span class="tag">${factionMap[g.faction]?.label || g.faction}</span>
          <span class="tag">${g.form}</span>
          <span class="tag">${g.troop}</span>
          <span class="tag">${g.career}</span>
        </div>
        <div class="card-meta">
          <span class="tag">資質 ${g.aptitude}</span>
          <span class="tag">前綴 ${g.prefix}</span>
        </div>
        <div class="card-desc">${g.bio || ""}</div>
      </div>
    </article>
  `).join("");
}
function renderSkillItem(skill){
  return `
    <div class="skill-item">
      <div class="skill-top">
        <div class="skill-name">${skill.name}</div>
        <div class="skill-type">${skill.type || "技能"}</div>
      </div>
      ${(skill.cost || skill.cooldown) ? `<div class="skill-meta">消耗：${skill.cost || "-"}　冷卻：${skill.cooldown || "-"}</div>` : ""}
      <div class="skill-desc">${skill.desc || ""}</div>
    </div>
  `;
}
function renderSkillGroup(title, items){
  if(!items || !items.length) return "";
  return `
    <section class="skill-group">
      <div class="skill-group-title">${title}</div>
      <div class="skill-list">
        ${items.map(renderSkillItem).join("")}
      </div>
    </section>
  `;
}
function buildSkillSections(g){
  const groups = [];
  if(g.form === "封侯" && g.skills.lord) groups.push(renderSkillGroup("主公技", [g.skills.lord]));
  if(g.skills.active) groups.push(renderSkillGroup("主動技", [g.skills.active]));
  if(g.skills.passives?.length) groups.push(renderSkillGroup("被動技", g.skills.passives));
  if(g.form === "拜將" && g.skills.strategy?.length) groups.push(renderSkillGroup("將略技", g.skills.strategy));
  if(g.form === "拜將" && g.skills.followers?.length) groups.push(renderSkillGroup("隨從技能", g.skills.followers));
  return groups.join("");
}
function openModal(id){
  const g = generals.find(item => item.id === id);
  if(!g) return;
  document.getElementById("modalFaction").textContent = `${factionMap[g.faction]?.label || g.faction}｜${g.form}`;
  document.getElementById("modalTitle").textContent = g.name;
  document.getElementById("modalAttrs").innerHTML = `
    <div class="attr-item"><div class="label">職業</div><div class="value">${g.career || "-"}</div></div>
    <div class="attr-item"><div class="label">資質</div><div class="value">${g.aptitude || "-"}</div></div>
    <div class="attr-item"><div class="label">前綴</div><div class="value">${g.prefix || "-"}</div></div>
    <div class="attr-item"><div class="label">兵種</div><div class="value">${g.troop || "-"}</div></div>
  `;
  document.getElementById("modalSkills").innerHTML = buildSkillSections(g);
  document.getElementById("detailModal").classList.add("open");
  document.getElementById("detailModal").setAttribute("aria-hidden", "false");
}
function closeModal(){
  document.getElementById("detailModal").classList.remove("open");
  document.getElementById("detailModal").setAttribute("aria-hidden", "true");
}
function applyFilters(){
  const q = searchQuery.trim().toLowerCase();
  const filtered = generals.filter(g => {
    const matchFaction = activeFaction === "all" || g.faction === activeFaction;
    const matchForm = activeForm === "all" || g.form === activeForm;
    const matchTroop = activeTroop === "all" || g.troop === activeTroop;
    const matchCareer = activeCareer === "all" || g.career === activeCareer;
    const haystack = [g.name, g.prefix, g.troop, g.career, g.form, g.bio].join(" ").toLowerCase();
    const matchSearch = !q || haystack.includes(q);
    return matchFaction && matchForm && matchTroop && matchCareer && matchSearch;
  });
  renderCards(filtered);
}
document.getElementById("searchInput").addEventListener("input", e => {
  searchQuery = e.target.value;
  applyFilters();
});
document.querySelectorAll(".filter-chip").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-chip").forEach(el => el.classList.remove("active"));
    btn.classList.add("active");
    activeFaction = btn.dataset.faction;
    applyFilters();
  });
});
document.getElementById("formFilter").addEventListener("change", e => {
  activeForm = e.target.value;
  applyFilters();
});
document.getElementById("troopFilter").addEventListener("change", e => {
  activeTroop = e.target.value;
  applyFilters();
});
document.getElementById("careerFilter").addEventListener("change", e => {
  activeCareer = e.target.value;
  applyFilters();
});
document.getElementById("generalGrid").addEventListener("click", e => {
  const card = e.target.closest(".general-card");
  if(card) openModal(Number(card.dataset.id));
});
document.getElementById("generalGrid").addEventListener("keydown", e => {
  if(e.key !== "Enter" && e.key !== " ") return;
  const card = e.target.closest(".general-card");
  if(card){
    e.preventDefault();
    openModal(Number(card.dataset.id));
  }
});
document.getElementById("modalClose").addEventListener("click", closeModal);
document.getElementById("detailModal").addEventListener("click", e => {
  if(e.target.id === "detailModal") closeModal();
});
document.addEventListener("keydown", e => {
  if(e.key === "Escape") closeModal();
});
document.getElementById("themeToggle").addEventListener("click", () => {
  const html = document.documentElement;
  html.dataset.theme = html.dataset.theme === "dark" ? "light" : "dark";
});
fillSelectOptions("troopFilter", uniqueValues("troop"));
fillSelectOptions("careerFilter", uniqueValues("career"));
applyFilters();
</script>
</body>
</html>
